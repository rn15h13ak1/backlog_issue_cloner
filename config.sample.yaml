# ============================================================
# Backlog 課題クローンツール 設定ファイル
# ============================================================
# このファイルをコピーして config.yaml を作成してください。
# config.yaml は .gitignore で除外されています（API キーを含むため）。
#
#   cp config.sample.yaml config.yaml
#
# 依存ライブラリのインストール:
#   pip install pyyaml
# ============================================================

# ------------------------------------------------------------
# Backlog 接続設定
# ------------------------------------------------------------
backlog:
  space_host: "yourcompany.backlog.com"  # スペースのホスト名（例: myteam.backlog.com）
  api_key: "YOUR_API_KEY_HERE"           # Backlog API キー（個人設定 → API から取得）
  ssl_verify: true                       # SSL 証明書検証（オンプレ版で false にする場合あり）
  base_path: ""                          # オンプレ版のパスプレフィックス（例: "/backlog"）

# ------------------------------------------------------------
# クローン設定
# ------------------------------------------------------------
clone:
  # コピー元の課題キー（例: PROJ-123）
  source_issue_key: "PROJ-123"

  # 新規課題の件名テンプレート
  # {YYYYMMDD} は --date または今日の日付（yyyymmdd形式）に置換されます
  # 例の結果: "【定期】20260409 週次タスク"
  summary_template: "【定期】{YYYYMMDD} タスク"

  # 作成先プロジェクトキー（省略時: コピー元課題と同じプロジェクト）
  # target_project_key: "PROJ"

  # 種別名（省略時: プロジェクトの最初の種別）
  # Backlog プロジェクトの種別設定と一致する名前を指定してください
  # issue_type: "タスク"

  # 優先度名（省略時: "中" があれば "中"、なければ最初の優先度）
  # 利用可能な値: 最高 / 高 / 中 / 低
  # priority: "中"
